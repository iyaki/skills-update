name: sync template files

on:
  push:
    branches:
      - main
    paths-ignore:
      - templates/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-template-files-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge changed root files into matching template files
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"
          before_sha="$zero_sha"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
              before_sha="$(git rev-parse "${GITHUB_SHA}^")"
            fi
            mapfile -t changed_files < <(git ls-files ':!:templates/**')
          else
            before_sha="${{ github.event.before }}"

            if [[ "$before_sha" == "$zero_sha" ]]; then
              mapfile -t changed_files < <(git show --pretty='' --name-only "${GITHUB_SHA}")
            else
              mapfile -t changed_files < <(git diff --name-only --diff-filter=AMRT "$before_sha" "${GITHUB_SHA}")
            fi
          fi

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No changed files detected; nothing to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t template_dirs < <(find templates -mindepth 1 -maxdepth 1 -type d | sort)

          if [[ ${#template_dirs[@]} -eq 0 ]]; then
            echo "No template directories found; nothing to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Files intentionally different per template stack; never synced from root.
          no_sync_files=(
            "README.md"
            ".gitignore"
            "lefthook.yml"
          )

          synced_targets=()
          conflict_targets=()
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT

          for source in "${changed_files[@]}"; do
            [[ -z "$source" ]] && continue
            [[ "$source" == templates/* ]] && continue
            [[ ! -f "$source" ]] && continue

            basename_source="$(basename "$source")"
            skip=false
            for no_sync in "${no_sync_files[@]}"; do
              if [[ "$basename_source" == "$no_sync" ]]; then
                skip=true
                break
              fi
            done
            [[ "$skip" == true ]] && continue

            for template_dir in "${template_dirs[@]}"; do
              target="$template_dir/$source"

              if [[ -f "$target" ]]; then
                base_file="$temp_dir/base"
                ours_file="$temp_dir/ours"
                theirs_file="$temp_dir/theirs"
                merged_file="$temp_dir/merged"

                if [[ "$before_sha" != "$zero_sha" ]] && git cat-file -e "$before_sha:$source" 2>/dev/null; then
                  git show "$before_sha:$source" > "$base_file"
                else
                  cp "$source" "$base_file"
                fi

                cp "$target" "$ours_file"
                cp "$source" "$theirs_file"

                set +e
                git merge-file -p "$ours_file" "$base_file" "$theirs_file" > "$merged_file"
                merge_exit=$?
                set -e

                if [[ "$merge_exit" -eq 0 ]]; then
                  if ! cmp -s "$target" "$merged_file"; then
                    cp "$merged_file" "$target"
                    synced_targets+=("$target")
                  fi
                elif [[ "$merge_exit" -eq 1 ]]; then
                  conflict_targets+=("$target")
                else
                  echo "git merge-file failed unexpectedly for $target"
                  exit 1
                fi
              fi
            done
          done

          if [[ ${#conflict_targets[@]} -gt 0 ]]; then
            echo "Merge conflicts detected while syncing template files:"
            printf ' - %s\n' "${conflict_targets[@]}"
            exit 1
          fi

          if [[ ${#synced_targets[@]} -eq 0 ]]; then
            echo "No matching template files found for changed root files."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet -- "${synced_targets[@]}"; then
            echo "No changes after sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_targets < <(git diff --name-only -- "${synced_targets[@]}" | sort -u)
          {
            echo "changed_targets<<EOF"
            printf '%s\n' "${changed_targets[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Synced ${#changed_targets[@]} template file(s)."
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request with synced changes
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: sync template files from root"
          body: |
            Automated 3-way merge of changed root files into matching files in template stacks.

            Changed template files:
            ${{ steps.sync.outputs.changed_targets }}

            This PR is generated after pushes to `main`.
          commit-message: "chore: sync template files from root"
          branch: "sync/template-files-${{ github.run_id }}"
          delete-branch: true
          labels: |
            chore
            automation
          add-paths: |
            templates/**
