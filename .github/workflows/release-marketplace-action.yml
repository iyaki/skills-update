name: release marketplace action

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Immutable release tag in vX.Y.Z format.
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run runtime smoke tests
        run: bash scripts/test-run-skill-update.sh

      - name: Run workflow contract checks
        run: bash scripts/test-marketplace-workflows.sh

  publish:
    needs: verify
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.release-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag format
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release-tag must match vX.Y.Z" >&2
            exit 1
          fi

      - name: Create immutable release tag
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          git fetch --tags origin
          if git rev-parse "$release_tag" >/dev/null 2>&1; then
            echo "Tag already exists: $release_tag" >&2
            exit 1
          fi
          git tag "$release_tag" "$GITHUB_SHA"
          git push origin "refs/tags/$release_tag"

      - name: Publish GitHub release
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          gh release create "$release_tag" --title "$release_tag" --generate-notes

      - name: Move major alias tag
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          git tag -f v1 "$release_tag"
          git push origin "refs/tags/v1" --force
