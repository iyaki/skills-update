# https://lefthook.dev/configuration/

assert_lefthook_installed: true

no_tty: true

output:
  - failure

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  setup:
    - run: npx prettier --write {staged_files}
      stage_fixed: true
      glob: "*.{js,mjs,json,md,html,yml,yaml}"
  jobs:
    - name: lint
      run: npm run lint
      glob: "*.{js,mjs}"
    - name: tests
      run: npm run test
      glob: "*.{js,mjs}"
    - name: coverage
      run: npm run coverage
      glob: "*.{js,mjs}"
