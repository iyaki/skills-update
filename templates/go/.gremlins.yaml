# Detect invisible unicode and suspicious text artifacts.
# Run with: gremlins unleash

excludedDirs:
  - .git
  - vendor
  - node_modules
  - dist
  - coverage

excludedFiles:
  - go.sum

rules:
  zero-width-space: error
  zero-width-non-joiner: error
  zero-width-joiner: error
  left-to-right-override: error
  right-to-left-override: error
  byte-order-mark: error
