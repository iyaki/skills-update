# https://lefthook.dev/configuration/

assert_lefthook_installed: true

no_tty: true

output:
  - failure

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  setup:
    - run: make format
      stage_fixed: true
  jobs:
    - name: test
      run: make test
      glob: "*.go"
    - name: golangci-lint
      run: make lint
      glob: "*.go"
    - name: test-coverage
      run: make test-coverage
      glob: "*.go"
    - name: mutation
      run: make mutation
      glob: "*.go"
    - name: security
      run: make security
      glob: "*.go"
    - name: arch
      run: make arch
      glob: "*.go"
