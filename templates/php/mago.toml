php-version = "8.3"

[source]
paths = ["src", "tests"]
includes = ["vendor"]
excludes = [
    "vendor/**",
    "coverage/**",
    "tmp/**",
    "build/**",
    "tests/fixtures/**",
]

[linter]
default_severity = "error"
excludes = []

[linter.rules]
# Uncomment and configure rules as needed.
# See: https://mago.carthage.software/tools/linter/rules-and-categories
#
# Example rule overrides:
# return-type = "warning"
# no-unused-variable = "off"

[formatter]
# Follows PER-CS coding standard.
# See: https://mago.carthage.software/tools/formatter/configuration-reference
excludes = []

[analyzer]
# Performs deep semantic analysis.
# See: https://mago.carthage.software/tools/analyzer/configuration-reference
excludes = ["tests/**"]
