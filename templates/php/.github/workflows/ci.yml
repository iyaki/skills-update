name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ '8.3', '8.4' ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, dom, mbstring
          coverage: xdebug
          tools: composer:latest

      - name: Cache PHP dependencies
        uses: shivammathur/cache-extensions@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, dom, mbstring
          key: php-cache-v1

      - name: Cache Composer cache directory
        uses: actions/cache@v3
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        uses: ramsey/composer-install@v2
        with:
          composer-options: "--no-interaction --no-progress --no-scripts"

      - name: Run post-install scripts
        run: composer run-script post-install-cmd --no-interaction

      - name: Validate composer
        run: composer validate:composer

      - name: Mago lint
        run: composer lint

      - name: Mago format check
        run: composer format:check

      - name: Mago analyze
        run: composer analyze

      - name: PHPStan analysis
        run: composer phpstan

      - name: Composer dependency analyser
        run: composer deps:analyze

      - name: Run tests
        run: composer test

      - name: Generate coverage report
        run: composer test:coverage

      - name: Mutation testing
        run: composer mutation
        continue-on-error: true
