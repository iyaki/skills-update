# https://lefthook.dev/configuration/

assert_lefthook_installed: true

no_tty: true

output:
  - failure

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  setup:
    - run: composer format
      stage_fixed: true
      glob: "*.php"
  jobs:
    - name: composer-validate
      run: composer validate:composer
      glob: "composer.json"
    - name: composer-autoload
      run: composer validate:autoload
      glob: "*.php"
    - name: mago-lint
      run: composer lint
      glob: "*.php"
    - name: mago-analyze
      run: composer analyze
      glob: "*.php"
    - name: phpstan
      run: composer phpstan
      glob: "*.php"
    - name: dependency-analyser
      run: composer deps:analyze
      glob: "*.php"
    - name: tests
      run: composer test
      glob: "*.php"
    - name: mutation
      run: composer mutation
      glob: "*.php"
